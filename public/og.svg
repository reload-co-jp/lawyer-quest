<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect x="0" y="0" width="4" height="630" fill="#00b8cc"/>

  <!-- grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- label -->
  <text x="80" y="220" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#00b8cc" letter-spacing="4">行政書士試験対策</text>

  <!-- title -->
  <text x="80" y="330" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#f1f1f0" letter-spacing="-2">Lawyer Quest</text>

  <!-- subtitle -->
  <text x="80" y="390" font-family="Georgia, serif" font-size="24" fill="#8a8a8a">法律を、冒険のように攻略する。</text>

  <!-- tags -->
  <rect x="80" y="440" width="90" height="28" fill="rgba(0,184,204,0.12)" stroke="#00b8cc" stroke-width="1"/>
  <text x="125" y="459" font-family="Georgia, serif" font-size="13" fill="#00b8cc" text-anchor="middle">行政法</text>

  <rect x="184" y="440" width="72" height="28" fill="rgba(0,201,122,0.12)" stroke="#00c97a" stroke-width="1"/>
  <text x="220" y="459" font-family="Georgia, serif" font-size="13" fill="#00c97a" text-anchor="middle">民法</text>

  <rect x="270" y="440" width="72" height="28" fill="rgba(155,68,224,0.12)" stroke="#9b44e0" stroke-width="1"/>
  <text x="306" y="459" font-family="Georgia, serif" font-size="13" fill="#9b44e0" text-anchor="middle">憲法</text>
</svg>
